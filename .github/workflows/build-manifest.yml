name: Build manifest

on:
  push:
    paths:
      - 'images/**'

permissions:
  contents: write

concurrency:
  group: build-manifest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rename newly added images by upload time
        run: node scripts/rename-images.js

      - name: Regenerate manifest.json
        run: node scripts/build-manifest.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A images manifest.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild image manifest"
            git push origin HEAD:${{ github.ref_name }}
          fi
